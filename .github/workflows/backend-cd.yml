name: Backend CD Simulation

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Run Basic Check
        run: node --check index.js

      - name: Simulate Deployment
        run: echo "🚀 Backend deployed successfully (simulation)"